<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      .web-bg { fill: #0D1117; }
      @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      @keyframes data-flow { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
      @keyframes node-glow { 0%,100% { filter: drop-shadow(0 0 2px #00FF41); } 50% { filter: drop-shadow(0 0 8px #00FF41); } }
      @keyframes spider-pulse { 0%,100% { r: 18; } 50% { r: 22; } }
      @keyframes crawl-dot { 0% { offset-distance: 0%; opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
      .web-line { stroke: #00FF41; stroke-width: 0.8; opacity: 0.25; }
      .web-line-bright { stroke: #00FF41; stroke-width: 1.2; opacity: 0.5; stroke-dasharray: 4 2; animation: data-flow 1.5s linear infinite; }
      .web-ring { fill: none; stroke: #00FF41; stroke-width: 0.6; opacity: 0.15; }
      .node-circle { fill: #0D1117; stroke: #00FF41; stroke-width: 2; animation: node-glow 3s ease-in-out infinite; }
      .node-text { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 10px; text-anchor: middle; font-weight: bold; }
      .spider-core { fill: #00FF41; animation: spider-pulse 2s ease-in-out infinite; }
      .spider-glow { fill: none; stroke: #00FF41; opacity: 0.3; stroke-width: 1; animation: spider-pulse 2s ease-in-out infinite; }
      .center-text { fill: #0D1117; font-family: 'Courier New', monospace; font-size: 9px; text-anchor: middle; font-weight: bold; }
      .label { fill: #00C9FF; font-family: 'Courier New', monospace; font-size: 20px; text-anchor: middle; font-weight: bold; }
      .sublabel { fill: #00C9FF; font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; opacity: 0.6; }
      .data-dot { fill: #00FF41; opacity: 0; }
      .d1 { cx: 400; cy: 250; animation: pulse 2s ease 0s infinite; }
      .d2 { cx: 400; cy: 250; animation: pulse 2s ease 0.5s infinite; }
      .d3 { cx: 400; cy: 250; animation: pulse 2s ease 1s infinite; }
    </style>
  </defs>

  <rect class="web-bg" width="800" height="500" rx="6"/>

  <!-- Title -->
  <text class="label" x="400" y="35">🕸️ THE WEB — EVERYTHING CONNECTS TO ME</text>
  <text class="sublabel" x="400" y="52">data flows inward • intelligence flows outward</text>

  <!-- Concentric web rings -->
  <circle class="web-ring" cx="400" cy="275" r="60"/>
  <circle class="web-ring" cx="400" cy="275" r="110"/>
  <circle class="web-ring" cx="400" cy="275" r="170"/>

  <!-- Web threads (radial lines from center to nodes) -->
  <!-- Inner ring - core skills -->
  <line class="web-line-bright" x1="400" y1="275" x2="400" y2="110"/>
  <line class="web-line-bright" x1="400" y1="275" x2="555" y2="175"/>
  <line class="web-line-bright" x1="400" y1="275" x2="570" y2="335"/>
  <line class="web-line-bright" x1="400" y1="275" x2="460" y2="440"/>
  <line class="web-line-bright" x1="400" y1="275" x2="340" y2="440"/>
  <line class="web-line-bright" x1="400" y1="275" x2="230" y2="335"/>
  <line class="web-line-bright" x1="400" y1="275" x2="245" y2="175"/>

  <!-- Outer connections -->
  <line class="web-line" x1="400" y1="110" x2="310" y2="80"/>
  <line class="web-line" x1="400" y1="110" x2="490" y2="80"/>
  <line class="web-line" x1="555" y1="175" x2="650" y2="130"/>
  <line class="web-line" x1="555" y1="175" x2="680" y2="210"/>
  <line class="web-line" x1="570" y1="335" x2="700" y2="310"/>
  <line class="web-line" x1="570" y1="335" x2="690" y2="390"/>
  <line class="web-line" x1="460" y1="440" x2="520" y2="480"/>
  <line class="web-line" x1="340" y1="440" x2="280" y2="480"/>
  <line class="web-line" x1="230" y1="335" x2="100" y2="310"/>
  <line class="web-line" x1="230" y1="335" x2="110" y2="390"/>
  <line class="web-line" x1="245" y1="175" x2="120" y2="130"/>
  <line class="web-line" x1="245" y1="175" x2="150" y2="210"/>

  <!-- Cross web connections (connecting outer ring) -->
  <line class="web-line" x1="310" y1="80" x2="490" y2="80" style="opacity:0.1"/>
  <line class="web-line" x1="490" y1="80" x2="650" y2="130" style="opacity:0.1"/>
  <line class="web-line" x1="650" y1="130" x2="680" y2="210" style="opacity:0.1"/>
  <line class="web-line" x1="680" y1="210" x2="700" y2="310" style="opacity:0.1"/>
  <line class="web-line" x1="700" y1="310" x2="690" y2="390" style="opacity:0.1"/>
  <line class="web-line" x1="690" y1="390" x2="520" y2="480" style="opacity:0.1"/>
  <line class="web-line" x1="520" y1="480" x2="280" y2="480" style="opacity:0.1"/>
  <line class="web-line" x1="280" y1="480" x2="110" y2="390" style="opacity:0.1"/>
  <line class="web-line" x1="110" y1="390" x2="100" y2="310" style="opacity:0.1"/>
  <line class="web-line" x1="100" y1="310" x2="150" y2="210" style="opacity:0.1"/>
  <line class="web-line" x1="150" y1="210" x2="120" y2="130" style="opacity:0.1"/>
  <line class="web-line" x1="120" y1="130" x2="310" y2="80" style="opacity:0.1"/>

  <!-- INNER RING NODES (primary skills) -->
  <!-- Python -->
  <circle class="node-circle" cx="400" cy="110" r="25"/>
  <text class="node-text" x="400" y="107">🐍</text>
  <text class="node-text" x="400" y="120">PYTHON</text>

  <!-- ML/AI -->
  <circle class="node-circle" cx="555" cy="175" r="25"/>
  <text class="node-text" x="555" y="172">🧠</text>
  <text class="node-text" x="555" y="185">ML / AI</text>

  <!-- APIs -->
  <circle class="node-circle" cx="570" cy="335" r="25"/>
  <text class="node-text" x="570" y="332">🔌</text>
  <text class="node-text" x="570" y="345">APIs</text>

  <!-- Bots -->
  <circle class="node-circle" cx="460" cy="440" r="25"/>
  <text class="node-text" x="460" y="437">🤖</text>
  <text class="node-text" x="460" y="450">BOTS</text>

  <!-- Scrapers -->
  <circle class="node-circle" cx="340" cy="440" r="25"/>
  <text class="node-text" x="340" y="437">🕷️</text>
  <text class="node-text" x="340" y="450">SCRAPERS</text>

  <!-- Data -->
  <circle class="node-circle" cx="230" cy="335" r="25"/>
  <text class="node-text" x="230" y="332">📊</text>
  <text class="node-text" x="230" y="345">DATA</text>

  <!-- Automation -->
  <circle class="node-circle" cx="245" cy="175" r="25"/>
  <text class="node-text" x="245" y="172">⚡</text>
  <text class="node-text" x="245" y="185">AUTO</text>

  <!-- OUTER RING NODES (sub-skills) -->
  <circle class="node-circle" cx="310" cy="80" r="16"/><text class="node-text" x="310" y="83" font-size="8">FASTAPI</text>
  <circle class="node-circle" cx="490" cy="80" r="16"/><text class="node-text" x="490" y="83" font-size="8">DOCKER</text>
  <circle class="node-circle" cx="650" cy="130" r="16"/><text class="node-text" x="650" y="133" font-size="8">TORCH</text>
  <circle class="node-circle" cx="680" cy="210" r="16"/><text class="node-text" x="680" y="213" font-size="8">LANGCHN</text>
  <circle class="node-circle" cx="700" cy="310" r="16"/><text class="node-text" x="700" y="313" font-size="8">REST</text>
  <circle class="node-circle" cx="690" cy="390" r="16"/><text class="node-text" x="690" y="393" font-size="8">GRAPHQL</text>
  <circle class="node-circle" cx="520" cy="480" r="16"/><text class="node-text" x="520" y="483" font-size="8">SELENIU</text>
  <circle class="node-circle" cx="280" cy="480" r="16"/><text class="node-text" x="280" y="483" font-size="8">SCRAPY</text>
  <circle class="node-circle" cx="110" cy="390" r="16"/><text class="node-text" x="110" y="393" font-size="8">POSTGRS</text>
  <circle class="node-circle" cx="100" cy="310" r="16"/><text class="node-text" x="100" y="313" font-size="8">MONGO</text>
  <circle class="node-circle" cx="150" cy="210" r="16"/><text class="node-text" x="150" y="213" font-size="8">AWS</text>
  <circle class="node-circle" cx="120" cy="130" r="16"/><text class="node-text" x="120" y="133" font-size="8">LINUX</text>

  <!-- CENTER: The Spider (Qasim) -->
  <circle class="spider-glow" cx="400" cy="275" r="30"/>
  <circle class="spider-glow" cx="400" cy="275" r="36" style="opacity:0.15"/>
  <circle class="spider-core" cx="400" cy="275" r="18"/>
  <text class="center-text" x="400" y="272">THE</text>
  <text class="center-text" x="400" y="282">SPIDER</text>

  <!-- Pulsing data dots on threads -->
  <circle class="data-dot d1" r="2"/>
  <circle class="data-dot d2" r="2"/>
  <circle class="data-dot d3" r="2"/>
</svg>
