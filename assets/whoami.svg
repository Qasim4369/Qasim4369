<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      @keyframes cursor-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes scanline { 0% { transform: translateY(-10px); } 100% { transform: translateY(420px); } }
      .bg { fill: #0D1117; }
      .border { fill: none; stroke: #00FF41; stroke-width: 2; opacity: 0.8; }
      .keyword { fill: #FF79C6; font-family: 'Courier New', monospace; font-size: 13px; }
      .classname { fill: #50FA7B; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
      .func { fill: #50FA7B; font-family: 'Courier New', monospace; font-size: 13px; }
      .param { fill: #FFB86C; font-family: 'Courier New', monospace; font-size: 13px; }
      .self { fill: #BD93F9; font-family: 'Courier New', monospace; font-size: 13px; font-style: italic; }
      .string { fill: #F1FA8C; font-family: 'Courier New', monospace; font-size: 13px; }
      .comment { fill: #6272A4; font-family: 'Courier New', monospace; font-size: 13px; font-style: italic; }
      .bracket { fill: #F8F8F2; font-family: 'Courier New', monospace; font-size: 13px; }
      .operator { fill: #FF79C6; font-family: 'Courier New', monospace; font-size: 13px; }
      .text { fill: #F8F8F2; font-family: 'Courier New', monospace; font-size: 13px; }
      .linenum { fill: #555555; font-family: 'Courier New', monospace; font-size: 11px; }
      .header { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .cursor { fill: #F8F8F2; animation: cursor-blink 1s step-end infinite; }
      .corner { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 9px; opacity: 0.3; }
      .scan { fill: rgba(0,255,65,0.03); animation: scanline 5s linear infinite; }
      .tab-bg { fill: #1a1a2e; }
      .tab-text { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 11px; }
    </style>
  </defs>

  <rect class="bg" width="900" height="420" rx="6"/>
