  <text class="linenum" x="28" y="345">15</text>
  <text class="string" x="120" y="345">"🏢 Turning legacy businesses into AI-native machines"</text>
  <text class="bracket" x="560" y="345">,</text>

  <!-- Line 16 -->
  <text class="linenum" x="28" y="365">16</text>
  <text class="string" x="120" y="365">"⚡ Automating everything between input and outcome"</text>

  <!-- Line 17 -->
  <text class="linenum" x="28" y="385">17</text>
  <text class="bracket" x="100" y="385">]</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="115" y="375" width="8" height="14"/>

  <!-- Corners -->
  <text class="corner" x="22" y="30">PYTHON 3.12</text>
  <text class="corner" x="800" y="30">UTF-8</text>
  <text class="corner" x="22" y="400">operator.py</text>
  <text class="corner" x="790" y="400">MODIFIED ●</text>
</svg>
