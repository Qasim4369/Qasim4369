  <text class="operator" x="248" y="205">=</text>
  <text class="string" x="268" y="205">"If it can be automated, it should be."</text>

  <!-- Line 9 (blank) -->
  <text class="linenum" x="35" y="225">9</text>

  <!-- Line 10 -->
  <text class="linenum" x="28" y="245">10</text>
  <text class="keyword" x="80" y="245">def</text>
  <text class="func" x="115" y="245">current_missions</text>
  <text class="bracket" x="250" y="245">(</text>
  <text class="self" x="259" y="245">self</text>
  <text class="bracket" x="293" y="245">):</text>

  <!-- Line 11 -->
  <text class="linenum" x="28" y="265">11</text>
  <text class="keyword" x="100" y="265">return</text>
  <text class="bracket" x="155" y="265">[</text>

  <!-- Line 12 -->
  <text class="linenum" x="28" y="285">12</text>
  <text class="string" x="120" y="285">"🕷️ Building bots, scrapers &amp; crawlers that never sleep"</text>
  <text class="bracket" x="570" y="285">,</text>

  <!-- Line 13 -->
  <text class="linenum" x="28" y="305">13</text>
  <text class="string" x="120" y="305">"🔌 Engineering APIs that connect the disconnected"</text>
  <text class="bracket" x="530" y="305">,</text>

