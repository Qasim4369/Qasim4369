  <text class="self" x="100" y="165">self</text>
  <text class="text" x="134" y="165">.education</text>
  <text class="operator" x="235" y="165">=</text>
  <text class="string" x="255" y="165">"FAST NUCES Islamabad — The Waterloo of Pakistan 🇵🇰"</text>

