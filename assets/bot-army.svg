    <style>
      @keyframes hover { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
      @keyframes glow-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes eye-blink { 0%,90%,100% { opacity: 1; } 95% { opacity: 0; } }
      @keyframes scanline { 0% { transform: translateY(-10px); } 100% { transform: translateY(450px); } }
      .bg { fill: #0D1117; }
      .border { fill: none; stroke: #00FF41; stroke-width: 2; opacity: 0.8; }
      .header { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .bot-body { fill: #0D1117; stroke: #00FF41; stroke-width: 1.5; }
      .bot-head { fill: #0D1117; stroke: #00FF41; stroke-width: 1.5; }
      .bot-eye { fill: #00FF41; animation: eye-blink 4s ease-in-out infinite; }
      .bot-antenna { stroke: #00FF41; stroke-width: 1.5; fill: none; }
      .bot-antenna-tip { fill: #00FF41; animation: glow-pulse 2s ease-in-out infinite; }
      .bot-label { fill: #00C9FF; font-family: 'Courier New', monospace; font-size: 10px; text-anchor: middle; font-weight: bold; }
      .bot-leg { stroke: #00FF41; stroke-width: 1.5; }
      .bot-arm { stroke: #00FF41; stroke-width: 1.5; }
      .footer-line { stroke: #00FF41; stroke-width: 1; opacity: 0.6; }
      .footer-text { fill: #00C9FF; font-family: 'Courier New', monospace; font-size: 13px; text-anchor: middle; }
      .footer-label { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 13px; text-anchor: middle; font-weight: bold; }
      .corner { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 9px; opacity: 0.3; }
      .row-label { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 10px; opacity: 0.4; }
      .scan { fill: rgba(0,255,65,0.03); animation: scanline 5s linear infinite; }
      .g1 { animation: hover 3s ease-in-out 0s infinite; }
      .g2 { animation: hover 3s ease-in-out 0.3s infinite; }
      .g3 { animation: hover 3s ease-in-out 0.6s infinite; }
      .g4 { animation: hover 3s ease-in-out 0.9s infinite; }
      .g5 { animation: hover 3s ease-in-out 1.2s infinite; }
